site_name: My blog
site_url: https://blog.ramseskools.nl
repo_url: https://github.com/RamsesKools/my-blog
repo_name: RamsesKools/my-blog

theme:
  name: material
  font: false
  logo: assets/logo-rk.svg
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
  palette:
    scheme: default
    primary: custom
    accent: custom
  features:
    - navigation.tabs

plugins:
  - blog:
      blog_dir: .
      draft_on_serve: true
  - blog:
      blog_dir: likes
      draft_on_serve: true
      blog_toc: true
      archive: false
      categories_allowed:
        - People
        - Tools
        - Products
        - Websites
        - Movies
        - Games

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format ""
extra_css:
  - assets/custom.css

nav:
  - Blog: index.md
  - Things I Like: likes/index.md
  - About: about.md
