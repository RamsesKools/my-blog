site_name: Ramses Kools
site_url: https://blog.ramseskools.nl

theme:
  name: material
  font: false
  logo: assets/logo-rk.svg
  favicon: assets/favicon.svg
  palette:
    scheme: default
    primary: custom
    accent: custom
  features:
    - navigation.tabs

plugins:
  - blog:
      blog_dir: blog
      draft_on_serve: true

extra_css:
  - assets/custom.css

nav:
  - Home: index.md
  - Blog: blog/index.md
  - Projects: projects.md
  - About: about.md
