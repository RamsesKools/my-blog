name: Deploy to GitHub Pages

on:
  release:
    types: [published]

  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag:
    name: Ensure CalVer tag
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    outputs:
      ref: ${{ steps.resolve.outputs.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve tag
        id: check
        run: |
          EXISTING_TAG=$(git tag --points-at HEAD | head -1)
          if [ -n "$EXISTING_TAG" ]; then
            echo "Commit already tagged: $EXISTING_TAG"
            echo "has_tag=true" >> "$GITHUB_OUTPUT"
            echo "tag=$EXISTING_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "has_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine CalVer version
        id: calver
        if: steps.check.outputs.has_tag != 'true'
        uses: energostack/calver-action@v1.0.3
        with:
          date_format: "%Y.%m.%d"

      - name: Create release
        if: steps.check.outputs.has_tag != 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.calver.outputs.next_version }}
          generate_release_notes: true

      - name: Set output ref
        id: resolve
        run: |
          if [ "${{ steps.check.outputs.has_tag }}" = "true" ]; then
            echo "ref=${{ steps.check.outputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ steps.calver.outputs.next_version }}" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [tag]
    if: always() && !failure() && !cancelled()
    steps:
      - name: Determine ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "ref=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ needs.tag.outputs.ref }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - uses: astral-sh/setup-uv@v6

      - name: Deploy to GitHub Pages
        run: uv run mkdocs gh-deploy --force
